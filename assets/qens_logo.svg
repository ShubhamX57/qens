<style>
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes dash {
    to { stroke-dashoffset: -20; }
  }

  #orbit1 { transform-origin: 150px 132px; animation: spin 8s linear infinite; }
  #orbit2 { transform-origin: 150px 132px; animation: spin 8s linear infinite reverse; }
  #orbit3 { transform-origin: 150px 132px; animation: spin 12s linear infinite; }

  #nucleus-outer { animation: pulse 2s ease-in-out infinite; }

  #beam { animation: dash 0.8s linear infinite; }

  #arc1 { animation: pulse 2s ease-in-out infinite; }
  #arc2 { animation: pulse 2s ease-in-out infinite 0.2s; }
  #arc3 { animation: pulse 2s ease-in-out infinite 0.4s; }
  #arc4 { animation: pulse 2s ease-in-out infinite 0.6s; }
</style>
